name: TokenPort upstream sync

on:
  workflow_dispatch:
  schedule:
    # Low-frequency check: approximately once every three days.
    - cron: '20 2 */3 * *'

concurrency:
  group: tokenport-upstream-sync
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out TokenPort product branch
        uses: actions/checkout@v4
        with:
          ref: tokenport/main
          fetch-depth: 0

      - name: Fetch Sub2API upstream
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/Wei-Shaw/sub2api.git || true
          git fetch upstream main
          git fetch origin main

      - name: Update upstream mirror branch
        shell: bash
        run: |
          if [ "$(git rev-parse origin/main)" = "$(git rev-parse upstream/main)" ]; then
            echo "Fork main already matches Sub2API upstream."
            exit 0
          fi

          if ! git merge-base --is-ancestor origin/main upstream/main; then
            echo "origin/main is not a fast-forward ancestor of upstream/main." >&2
            exit 1
          fi

          git push origin upstream/main:main

      - name: Merge upstream into a review branch
        id: merge
        shell: bash
        run: |
          upstream_sha="$(git rev-parse upstream/main)"
          if git merge-base --is-ancestor "$upstream_sha" HEAD; then
            echo "TokenPort already contains upstream commit $upstream_sha."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          branch="sync/upstream-${upstream_sha:0:12}"
          git switch -c "$branch"
          if ! git merge --no-edit upstream/main; then
            {
              echo "# TokenPort upstream synchronization conflict"
              echo
              echo "- Product branch: tokenport/main"
              echo "- Upstream commit: $upstream_sha"
              echo "- Review branch: $branch"
              echo
              echo "## Conflicted files"
              echo
              echo '```text'
              git diff --name-only --diff-filter=U
              echo '```'
            } > upstream-conflicts.md
            echo "conflicted=true" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "conflicted=false" >> "$GITHUB_OUTPUT"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

      - name: Set up Node
        if: steps.merge.outputs.has_changes == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up pnpm
        if: steps.merge.outputs.has_changes == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Validate TokenPort overlay
        if: steps.merge.outputs.has_changes == 'true'
        shell: pwsh
        run: ./scripts/check-tokenport-overlay.ps1

      - name: Test and build frontend
        if: steps.merge.outputs.has_changes == 'true'
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm typecheck
          pnpm test:run
          pnpm build

      - name: Build runtime image
        if: steps.merge.outputs.has_changes == 'true'
        run: docker build -t tokenport-upstream-sync:${GITHUB_SHA} .

      - name: Push review branch
        if: steps.merge.outputs.has_changes == 'true'
        run: |
          git push --force-with-lease origin "${{ steps.merge.outputs.branch }}"

      - name: Open synchronization pull request
        if: steps.merge.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          existing_url="$(gh pr list \
            --base tokenport/main \
            --head "${{ steps.merge.outputs.branch }}" \
            --state open \
            --json url \
            --jq '.[0].url // empty')"
          if [ -n "$existing_url" ]; then
            echo "Synchronization pull request already exists: $existing_url"
            exit 0
          fi

          gh pr create \
            --base tokenport/main \
            --head "${{ steps.merge.outputs.branch }}" \
            --title "sync: merge latest Sub2API upstream" \
            --body "Automated upstream merge. TokenPort overlay checks, frontend tests, and image build completed before this PR was opened."

      - name: Upload conflict report
        if: failure() && steps.merge.outputs.conflicted == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: tokenport-upstream-conflicts
          path: upstream-conflicts.md
          if-no-files-found: ignore

      - name: Open synchronization conflict issue
        if: failure() && steps.merge.outputs.conflicted == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          upstream_sha="$(git rev-parse upstream/main)"
          existing_url="$(gh issue list \
            --state open \
            --search 'TokenPort upstream synchronization conflict in:title' \
            --json url \
            --jq '.[0].url // empty')"
          if [ -n "$existing_url" ]; then
            gh issue comment "$existing_url" --body-file upstream-conflicts.md
            exit 0
          fi
          gh issue create \
            --title "TokenPort upstream synchronization conflict" \
            --body-file upstream-conflicts.md \
            --label "upstream-sync" || \
          gh issue create \
            --title "TokenPort upstream synchronization conflict" \
            --body-file upstream-conflicts.md
